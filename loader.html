<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wavy_loader</title>
  <style>
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
 <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #181A20;">
  
  <!-- Asli Circular Loader -->
  <div style="
    width: 50px; 
    height: 50px; 
    border: 5px solid #333; 
    border-top: 5px solid #F3BA2F; 
    border-radius: 50%; 
    animation: spin 1s linear infinite;
  "></div>

</div>
</body>
</html>
