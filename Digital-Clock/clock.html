<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="clock.css">
</head>
<body>

  <div class="clock-container">
    <div id="greeting"></div>
    <div id="time-wrapper">
        <span id="time"></span><span id="seconds"></span>
    </div>
    <div id="date"></div>
  </div>

<script>
function updateLiveClock() {
    var today = new Date();
    
    // 1. Month Names Array (Saves space over switch statements!)
    var months = ["January", "February", "March", "April", "May", "June", 
                  "July", "August", "September", "October", "November", "December"];
    
    var month = months[today.getMonth()];
    var date = today.getDate();
    var year = today.getFullYear();
    
    // 2. Time Logic
    var hours = today.getHours();
    var minutes = today.getMinutes();
    var seconds = today.getSeconds();
    var ampm = hours >= 12 ? "PM" : "AM";

    // 3. Greeting Logic
    var greeting = "";
    if (hours < 12) greeting = "Good Morning";
    else if (hours < 18) greeting = "Good Afternoon";
    else if (hours < 21) greeting = "Good Evening";
    else greeting = "Good Night";

    // 4. Formatting (Leading Zeros)
    var displayHours = hours % 12  || 12; // Convert to 12-hour format, with 12 instead of 0
    var displayMinutes = minutes < 10 ? "0" + minutes : minutes;
    var displaySeconds = seconds < 10 ? "0" + seconds : seconds;

    // 5. Inject into HTML
    document.getElementById("greeting").innerText = greeting;
    document.getElementById("time").innerText = displayHours + ":" + displayMinutes;
    document.getElementById("seconds").innerText = ":" + displaySeconds + " " + ampm;
    document.getElementById("date").innerText = month + " " + date + ", " + year;
}

// Update the clock every 1000ms (1 second)
setInterval(updateLiveClock, 1000);

// Run it once immediately so the user doesn't see "Loading" for 1 second
updateLiveClock();
</script>

</body>
</html>
