<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 450px;
            padding: 2rem; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header { margin-bottom: 1.5rem; }
        header h1 { font-size: 2rem; letter-spacing: -1px; }
        header p { color: #94a3b8; font-size: 0.85rem; }

        .input-area { display: flex; flex-direction: column; gap: 12px; margin-bottom: 2rem; }

        label { font-size: 0.75rem; color: #6366f1; font-weight: 600; margin-bottom: -8px; margin-top: 5px; }

        input, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px; color: white;
            outline: none; transition: 0.3s;
        }

        select option { background: #1e1b4b; color: white; }
        input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 8px rgba(99, 102, 241, 0.3); }

        #add-btn {
            background: #6366f1; border: none; color: white;
            padding: 14px; border-radius: 12px;
            font-weight: 600; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }

        #add-btn:hover { background: #4f46e5; transform: translateY(-2px); }

        ul { list-style: none; margin-top: 10px; }

        li {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 15px;
            display: flex; align-items: center;
            gap: 12px; margin-bottom: 12px;
            transition: 0.3s;
        }

        .checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: #10b981; }
        .task-info { flex: 1; }
        .task-info span { display: block; font-size: 1rem; }
        .task-info small { color: #94a3b8; font-size: 0.75rem; }

        .completed { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
        .completed span { text-decoration: line-through; opacity: 0.5; }

        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; }

        .ringing { animation: ring-pulse 1s infinite; border-color: #ef4444; }

        @keyframes ring-pulse {
            0% { background: rgba(239, 68, 68, 0.1); }
            50% { background: rgba(239, 68, 68, 0.3); }
            100% { background: rgba(239, 68, 68, 0.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Missions</h1>
            <p id="current-date"></p>
        </header>

        <div class="input-area">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            
            <label>Date & Time</label>
            <input type="datetime-local" id="todo-time">

            <label>Select & Preview Alarm Sound</label>
            <select id="sound-select">
                <option value="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">Default Beep</option>
                <option value="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3">Modern Alert</option>
                <option value="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3">Church Bell</option>
            </select>

            <button id="add-btn">Create Task</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <audio id="alarm-sound" loop></audio>
    <audio id="preview-sound"></audio>

    <script>
        const input = document.getElementById('todo-input');
        const timeInput = document.getElementById('todo-time');
        const soundSelect = document.getElementById('sound-select');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const alarmSound = document.getElementById('alarm-sound');
        const previewSound = document.getElementById('preview-sound');

        // Set Default Time to Now
        function setDefaultTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            timeInput.value = now.toISOString().slice(0, 16);
        }
        setDefaultTime();

        document.getElementById('current-date').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });

        // --- NEW: SOUND PREVIEW LOGIC ---
        soundSelect.addEventListener('change', () => {
            // Stop any ongoing alarm sound for a second to hear preview
            previewSound.src = soundSelect.value;
            previewSound.currentTime = 0;
            previewSound.play();
            
            setTimeout(() => {
                previewSound.pause();
            }, 2000);
        });

        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        function addTask() {
            const text = input.value;
            const time = timeInput.value;
            const selectedSound = soundSelect.value;

            if (text.trim() === "") return;

            const li = document.createElement('li');
            const taskId = Date.now();
            li.setAttribute('data-id', taskId);
            li.setAttribute('data-sound', selectedSound);

            li.innerHTML = `
                <input type="checkbox" class="checkbox" onchange="toggleTask(this, ${taskId})">
                <div class="task-info">
                    <span>${text}</span>
                    <small>⏰ ${new Date(time).toLocaleString()}</small>
                </div>
                <button class="delete-btn" onclick="removeTask(${taskId})">×</button>
            `;

            todoList.prepend(li);

            if (time) {
                const alarmTime = new Date(time).getTime();
                const checkInterval = setInterval(() => {
                    const now = new Date().getTime();
                    const item = document.querySelector(`[data-id="${taskId}"]`);
                    
                    if (!item) { clearInterval(checkInterval); return; }

                    if (now >= alarmTime && !item.classList.contains('completed')) {
                        if (!item.classList.contains('ringing')) {
                            item.classList.add('ringing');
                            playAlarm(selectedSound);
                            
                            if (Notification.permission === "granted") {
                                new Notification("Task Alert!", { body: text });
                            }
                        }
                    } else if (item.classList.contains('completed')) {
                        clearInterval(checkInterval);
                        stopAlarmIfNoRinging();
                    }
                }, 1000);
            }

            input.value = "";
            setDefaultTime();
        }

        function playAlarm(soundUrl) {
            alarmSound.src = soundUrl;
            alarmSound.play();
        }

        function toggleTask(checkbox, id) {
            const li = checkbox.parentElement;
            li.classList.toggle('completed');
            if (li.classList.contains('completed')) {
                li.classList.remove('ringing');
                stopAlarmIfNoRinging();
            }
        }

        function removeTask(id) {
            const item = document.querySelector(`[data-id="${id}"]`);
            if (item) {
                item.remove();
                stopAlarmIfNoRinging();
            }
        }

        function stopAlarmIfNoRinging() {
            const ringingItems = document.querySelectorAll('.ringing');
            if (ringingItems.length === 0) {
                alarmSound.pause();
                alarmSound.currentTime = 0;
            } else {
                alarmSound.src = ringingItems[0].getAttribute('data-sound');
                alarmSound.play();
            }
        }

        addBtn.addEventListener('click', addTask);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
    </script>
</body>
</html>
