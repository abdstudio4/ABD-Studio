<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Pro Studio - Shapes & Image Editor</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00bcd4; --text: #eee; }
        body { background-color: var(--bg); color: var(--text); margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        h3 { margin-top: 0; color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .tool-group { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: bold;}
        
        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        button:hover { background: #444; border-color: #555; }
        button.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
        .danger { background: #b71c1c; border-color: #d32f2f; }
        .danger:hover { background: #d32f2f; }
        .success { background: #2e7d32; border-color: #388e3c; margin-top: auto;}
        .success:hover { background: #388e3c; }

        /* Inputs */
        input[type="color"] { border: none; width: 100%; height: 35px; cursor: pointer; background: none; padding: 0; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        input[type="file"] { display: none; }
        .file-label { display: block; background: #333; color: white; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; border: 1px dashed #555; transition: 0.2s;}
        .file-label:hover { background: #444; border-color: var(--accent); }

        /* Canvas Area */
        #canvas-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #000; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; }
        .canvas-container { box-shadow: 0 10px 50px rgba(0,0,0,0.8); border-radius: 8px; overflow: hidden; }
        
        /* Context Menu for Crop */
        #crop-menu { display: none; position: absolute; background: var(--panel); border: 1px solid #444; border-radius: 4px; z-index: 100; }
        #crop-menu button { background: none; border: none; width: 100%; justify-content: flex-start; padding: 8px 15px; border-radius: 0;}
        #crop-menu button:hover { background: #333; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>JS Pro Studio</h3>

        <div class="tool-group">
            <label>Art board Actions</label>
            <div class="btn-grid">
                <button onclick="clearCanvas()" class="danger">🗑️ Clear</button>
                <button onclick="deleteSelected()">❌ Delete</button>
            </div>
        </div>

        <div class="tool-group">
            <label>Brush & Colors</label>
            <div class="btn-grid">
                <button id="drawBtn" onclick="toggleDrawing()">🖌️ Draw Mode</button>
                <button id="selectBtn" onclick="toggleSelect()" class="active">🖱️ Select</button>
            </div>
            <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                <div style="flex:1;"><label>Fill</label><input type="color" id="fillPicker" value="#00bcd4"></div>
                <div style="flex:1;"><label>Stroke</label><input type="color" id="strokePicker" value="#000000"></div>
            </div>
        </div>

        <div class="tool-group">
            <label>Add Shapes</label>
            <div class="btn-grid">
                <button onclick="addRect()">⬛ Rectangle</button>
                <button onclick="addCircle()">⚪ Circle</button>
                <button onclick="addTriangle()">🔺 Triangle</button>
                <button onclick="addText()">🔤 Text</button>
            </div>
        </div>

        <div class="tool-group">
            <label>Image Tools</label>
            <label for="imageLoader" class="file-label">📥 Upload Image</label>
            <input type="file" id="imageLoader" accept="image/*">
            
            <div style="margin-top:15px;">
                <label>Brightness</label>
                <input type="range" id="brightness" min="-1" max="1" step="0.01" value="0" disabled>
            </div>
            <div style="margin-top:10px;">
                <label>Contrast</label>
                <input type="range" id="contrast" min="-1" max="1" step="0.01" value="0" disabled>
            </div>
            <p style="font-size:11px; color:#888; margin-top:5px;">(Select image to enable filters/crop)</p>
        </div>

        <button onclick="saveCanvas()" class="success">💾 Save Design (PNG)</button>
    </div>

    <div id="canvas-wrapper">
        <canvas id="proCanvas"></canvas>
    </div>

    <div id="crop-menu">
        <button onclick="startCrop()">✂️ Crop Selected Image</button>
    </div>

<script>
    // --- Initialize Fabric.js Canvas ---
    const canvas = new fabric.Canvas('proCanvas', {
        width: 900,
        height: 600,
        backgroundColor: '#ffffff',
        preserveObjectStacking: true // Objects select karne par peeche na jayen
    });

    // Setup for High-DPI screens
    fabric.devicePixelRatio = window.devicePixelRatio || 1;

    // --- State Variables & UI References ---
    let isDrawingMode = false;
    const fillPicker = document.getElementById('fillPicker');
    const strokePicker = document.getElementById('strokePicker');
    const brightnessSlider = document.getElementById('brightness');
    const contrastSlider = document.getElementById('contrast');
    const cropMenu = document.getElementById('crop-menu');
    let currentImgObj = null; // Filter apply karne ke liye image reference

    // --- Core Functionality ---

    // 1. Drawing Mode
    function toggleDrawing() {
        isDrawingMode = true;
        canvas.isDrawingMode = true;
        canvas.freeDrawingBrush.color = strokePicker.value;
        canvas.freeDrawingBrush.width = 5;
        setActiveBtn('drawBtn');
    }

    function toggleSelect() {
        isDrawingMode = false;
        canvas.isDrawingMode = false;
        setActiveBtn('selectBtn');
    }

    function setActiveBtn(activeId) {
        document.getElementById('drawBtn').classList.remove('active');
        document.getElementById('selectBtn').classList.remove('active');
        document.getElementById(activeId).classList.add('active');
    }

    // Update colors when pickers change
    fillPicker.onchange = () => {
        const active = canvas.getActiveObject();
        if (active) active.set('fill', fillPicker.value);
        canvas.renderAll();
    };
    strokePicker.onchange = () => {
        const active = canvas.getActiveObject();
        if (isDrawingMode) canvas.freeDrawingBrush.color = strokePicker.value;
        if (active) active.set('stroke', strokePicker.value);
        canvas.renderAll();
    };


    // 2. Add Shapes (Rect, Circle, Triangle)
    function addRect() {
        const rect = new fabric.Rect({
            left: 100, top: 100,
            fill: fillPicker.value,
            stroke: strokePicker.value,
            strokeWidth: 2,
            width: 150, height: 100,
            cornerColor: varColor('--accent'), cornerSize: 10, transparentCorners: false
        });
        canvas.add(rect).setActiveObject(rect);
        toggleSelect();
    }

    function addCircle() {
        const circle = new fabric.Circle({
            left: 150, top: 150,
            fill: fillPicker.value,
            stroke: strokePicker.value,
            strokeWidth: 2,
            radius: 75,
            cornerColor: varColor('--accent'), cornerSize: 10, transparentCorners: false
        });
        canvas.add(circle).setActiveObject(circle);
        toggleSelect();
    }

    function addTriangle() {
        const tri = new fabric.Triangle({
            left: 200, top: 200,
            fill: fillPicker.value,
            stroke: strokePicker.value,
            strokeWidth: 2,
            width: 150, height: 150,
            cornerColor: varColor('--accent'), cornerSize: 10, transparentCorners: false
        });
        canvas.add(tri).setActiveObject(tri);
        toggleSelect();
    }

    function addText() {
        const text = new fabric.IText('Double click to edit', {
            left: 100, top: 100,
            fill: strokePicker.value,
            fontSize: 30,
            fontFamily: 'Segoe UI'
        });
        canvas.add(text).setActiveObject(text);
        toggleSelect();
    }


    // 3. Image Loading & Editing (Filters & Crop)
    document.getElementById('imageLoader').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            fabric.Image.fromURL(event.target.result, function(img) {
                // Scale image to fit canvas
                img.scaleToWidth(canvas.width / 2);
                img.set({
                    left: canvas.width / 4, top: canvas.height / 4,
                    cornerColor: varColor('--accent'), cornerSize: 12, transparentCorners: false
                });
                canvas.add(img).setActiveObject(img);
                canvas.renderAll();
            });
        };
        reader.readAsDataURL(file);
    };

    // Filters (Brightness & Contrast)
    function applyFilter(index, filter) {
        if (!currentImgObj) return;
        currentImgObj.filters[index] = filter;
        currentImgObj.applyFilters();
        canvas.renderAll();
    }

    brightnessSlider.oninput = function() {
        applyFilter(0, new fabric.Image.filters.Brightness({ brightness: parseFloat(this.value) }));
    };

    contrastSlider.oninput = function() {
        applyFilter(1, new fabric.Image.filters.Contrast({ contrast: parseFloat(this.value) }));
    };


    // Image Selection Handling (Enable filters & Right-Click Menu)
    canvas.on('selection:created', handleSelection);
    canvas.on('selection:updated', handleSelection);
    canvas.on('selection:cleared', function() {
        currentImgObj = null;
        brightnessSlider.disabled = true;
        contrastSlider.disabled = true;
        cropMenu.style.display = 'none';
    });

    function handleSelection(e) {
        const selected = e.selected[0];
        if (selected && selected.type === 'image') {
            currentImgObj = selected;
            brightnessSlider.disabled = false;
            contrastSlider.disabled = false;
            
            // Set slider values based on current filters
            brightnessSlider.value = selected.filters[0] ? selected.filters[0].brightness : 0;
            contrastSlider.value = selected.filters[1] ? selected.filters[1].contrast : 0;
        } else {
            currentImgObj = null;
            brightnessSlider.disabled = true;
            contrastSlider.disabled = true;
        }
    }

    // Right-Click Context Menu for Crop
    canvas.on('mouse:down', function(options) {
        if (options.button === 3 && currentImgObj) { // Right click
            cropMenu.style.display = 'block';
            cropMenu.style.left = options.e.clientX + 'px';
            cropMenu.style.top = options.e.clientY + 'px';
        } else {
            cropMenu.style.display = 'none';
        }
    });

    // Simple Crop Implementation
    function startCrop() {
        if (!currentImgObj) return;
        cropMenu.style.display = 'none';
        
        // Fabric.js mein professional cropping complex hai, yeh basic 'viewbox' crop hai.
        const width = prompt("Enter new width:", currentImgObj.width / 2);
        const height = prompt("Enter new height:", currentImgObj.height / 2);
        
        if(width && height) {
            currentImgObj.set({
                width: parseInt(width),
                height: parseInt(height),
                cropX: 0, cropY: 0 // Start crop from top-left
            });
            canvas.renderAll();
        }
    }


    // 4. General Actions (Clear, Delete, Save)
    function clearCanvas() {
        canvas.clear();
        canvas.backgroundColor = '#ffffff';
        canvas.renderAll();
    }

    function deleteSelected() {
        const active = canvas.getActiveObjects();
        if (active) {
            active.forEach(obj => canvas.remove(obj));
            canvas.discardActiveObject().renderAll();
        }
    }

    function saveCanvas() {
        const dataURL = canvas.toDataURL({
            format: 'png',
            quality: 1,
            multiplier: 2 // Save in double resolution (High quality)
        });
        const link = document.createElement('a');
        link.download = 'js-pro-design.png';
        link.href = dataURL;
        link.click();
    }

    // Helper: CSS Variable color lena
    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Keyboard support (Delete key)
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Delete') deleteSelected();
    });

    // Disable default browser right-click context menu on canvas
    document.querySelector('.canvas-container').addEventListener('contextmenu', e => e.preventDefault());

</script>
</body>
</html>
