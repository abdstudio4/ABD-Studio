<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Hand-Drawn Sun</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            font-family: sans-serif;
        }

        

        /* The central circle */
        .sun-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border: 4px solid #333;
            border-radius: 50%;
            background-color: #ffeb3b; /* A soft yellow */
            box-sizing: border-box;
            /* To make it look a bit less perfect, we can use a slight radius variation */
            /* border-radius: 52% 48% 50% 50%; */
        }


        .beam {
            position: absolute;
            top: 50%;
            left: 50%;
            background-color: #333; /* Color of the lines */
            border-radius: 2px;
            transform-origin: center center;
            box-sizing: border-box;
        }

        /* Define angles and lengths to make it look imperfect */
        .beam:nth-child(1)  { width: 40px; height: 3px; transform: translate(-50%, -50%) rotate(0deg) translate(65px); } /* Right */
        .beam:nth-child(2)  { width: 35px; height: 3px; transform: translate(-50%, -50%) rotate(30deg) translate(65px); }
        .beam:nth-child(3)  { width: 45px; height: 3px; transform: translate(-50%, -50%) rotate(60deg) translate(65px); }
        .beam:nth-child(4)  { width: 40px; height: 3px; transform: translate(-50%, -50%) rotate(90deg) translate(65px); } /* Top */
        .beam:nth-child(5)  { width: 35px; height: 3px; transform: translate(-50%, -50%) rotate(120deg) translate(65px); }
        .beam:nth-child(6)  { width: 42px; height: 3px; transform: translate(-50%, -50%) rotate(150deg) translate(65px); }
        .beam:nth-child(7)  { width: 40px; height: 3px; transform: translate(-50%, -50%) rotate(180deg) translate(65px); } /* Left */
        .beam:nth-child(8)  { width: 37px; height: 3px; transform: translate(-50%, -50%) rotate(210deg) translate(65px); }
        .beam:nth-child(9)  { width: 43px; height: 3px; transform: translate(-50%, -50%) rotate(240deg) translate(65px); }
        .beam:nth-child(10) { width: 40px; height: 3px; transform: translate(-50%, -50%) rotate(270deg) translate(65px); } /* Bottom */
        .beam:nth-child(11) { width: 35px; height: 3px; transform: translate(-50%, -50%) rotate(300deg) translate(65px); }
        .beam:nth-child(12) { width: 40px; height: 3px; transform: translate(-50%, -50%) rotate(330deg) translate(65px); }

        /* Let's add a second inner ring of lines to match the drawing better */
        .inner-beam {
            position: absolute;
            top: 50%;
            left: 50%;
            background-color: #814c4c;
            border-radius: 2px;
            transform-origin: center center;
            box-sizing: border-box;
        }

   
        

  

    </style>
</head>
<body>
    <div class="sun-container">
        <div class="sun-beams">
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            <div class="beam"></div>
            
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
            <div class="inner-beam"></div>
        </div>
        <div class="sun-center"></div>
    </div>
</body>
</html>
