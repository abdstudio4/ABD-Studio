<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body {
    background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
}

.player-card {
    position: relative;
    width: 320px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.15); /* Transparency */
    backdrop-filter: blur(15px);          /* Blur effect */
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    text-align: center;
    color: white;
}

.album-art img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 5px solid rgba(255, 255, 255, 0.3);
    margin-bottom: 15px;
}

.progress-container {
    background: rgba(255, 255, 255, 0.2);
    height: 6px;
    border-radius: 10px;
    margin: 20px 0;
    cursor: pointer;
}

.progress-bar {
    background: #fff;
    width: 40%; /* Demo progress */
    height: 100%;
    border-radius: 10px;
}

.btn {
    background: none;
    border: 1px solid white;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    margin: 0 5px;
}

.btn:hover {
    background: white;
    color: #ff9a9e;
}
</style>

<body>
     
<div class="player-card">
    <div class="album-art">
        <img src="cover1.jpg" id="track-img" alt="Song Cover">
    </div>
    <h2 id="track-title">Dil Se Re</h2>
    <p id="track-artist">A.R. Rahman</p>
    
    <input type="range" id="progress-bar" value="0" max="100">
    
    <div class="controls">
        <button class="btn" id="prev">prev</button>
        <button class="btn play-btn" id="play">play</button>
        <button class="btn" id="next">next</button>
    </div>
</div>

</body>
<script>
  const songs = [
    { title: "Dil Se Re", artist: "A.R. Rahman", src: "rahman.mp3", img: "rahman.jpg" },
    { title: "Afreen", artist: "Nusrat Fateh", src: "nusrat.mp3", img: "nusrat.jpg" },
    { title: "Dil Diyan Gallan", artist: "Atif Aslam", src: "atif.mp3", img: "atif.jpg" },
    // Yahan tum jitne chaho gane add kar lo...
];

let songIndex = 0;
let audio = new Audio(songs[songIndex].src);
const progressBar = document.getElementById('progress-bar');
const playBtn = document.getElementById('play');

// Gana Load Function
function loadSong(index) {
    const song = songs[index];
    document.getElementById('track-title').innerText = song.title;
    document.getElementById('track-artist').innerText = song.artist;
    document.getElementById('track-img').src = song.img;
    audio.src = song.src;
}

// 1. Play/Pause
playBtn.addEventListener('click', () => {
    if (audio.paused) {
        audio.play();
        playBtn.innerText = 'pause';
    } else {
        audio.pause();
        playBtn.innerText = 'play';
    }
});

// 2. Progress Bar Update (Gane ke sath sath slider chalna)
audio.addEventListener('timeupdate', () => {
    const progress = (audio.currentTime / audio.duration) * 100;
    progressBar.value = progress;
});

// 3. Seek Logic (Slider se gana agay peechay karna)
progressBar.addEventListener('input', () => {
    const seekTime = (progressBar.value / 100) * audio.duration;
    audio.currentTime = seekTime;
});

// 4. Next/Prev Buttons
document.getElementById('next').addEventListener('click', () => {
    songIndex = (songIndex + 1) % songs.length;
    loadSong(songIndex);
    audio.play();
    playBtn.innerText = 'pause';
});

document.getElementById('prev').addEventListener('click', () => {
    songIndex = (songIndex - 1 + songs.length) % songs.length;
    loadSong(songIndex);
    audio.play();
    playBtn.innerText = 'pause';
});
</script>
</html>
