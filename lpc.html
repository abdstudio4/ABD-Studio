<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boring Download Button</title>
</head>
<style>
:root {
  --bg-dark: #121212;
}

body {
  background-color: var(--bg-dark);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* --- Aam Sa Download Button Styling --- */
.simple-download-btn {
  background-color: #1e293b; /* Normal dull dark blue background */
  color: #ffffff;
  border: 2px solid #00d2ff; /* Simple cyan border */
  padding: 14px 28px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 6px; /* Standard boxy corners */
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: all 0.3s ease; /* Basic transition */
}

/* Standard Simple Icon */
.simple-icon-arrow {
  width: 20px;
  height: 20px;
  fill: #ffffff;
}

/* --- Basic Hover Effect --- */
.simple-download-btn:hover {
  background-color: #00d2ff; /* Hover par background simple change */
  color: #121212; /* Text color dark */
}

.simple-download-btn:hover .simple-icon-arrow {
  fill: #121212; /* Hover par icon color change */
}
</style>
<body>

  <!-- Aam Sa Button -->
  <button class="simple-download-btn">
    <svg class="simple-icon-arrow" viewBox="0 0 24 24">
      <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
    </svg>
    <span>Download CV</span>
  </button>

</body>
</html>
